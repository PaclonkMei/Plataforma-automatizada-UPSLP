{% extends "base.html" %}

{% block content %}
<div style="max-width:600px; margin:auto; padding:30px;">
  <h2 style="color:#b90e0e; margin-bottom:10px;">Eliminar usuario</h2>
  <p>¿Estás seguro de eliminar al usuario <strong>{{ usuario.username }}</strong>?</p>

  <form method="post" style="margin-top:15px;">
    {% csrf_token %}
    <button type="submit" class="btn-orange" style="padding:10px 18px; background:#b90e0e;">🗑️ Sí, eliminar</button>
    <a href="{% url 'usuarios:listar' %}" style="padding:10px 18px; background:#6c757d; color:white; text-decoration:none; border-radius:4px; display:inline-block; margin-left:8px;">Cancelar</a>
  </form>
</div>
{% endblock %}
